name: Build & Release ADBManager

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag, e.g. v1.4.0'
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ANDROID_HOME: ${{ github.workspace }}/android-sdk
      BUILD_TOOLS_VERSION: "36.0.0"
      COMPILE_SDK_VERSION: "36"
      JAVAC: javac
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Android SDK (cmdline-tools + build-tools 36 + platform 36)
        run: |
          mkdir -p "$ANDROID_HOME/cmdline-tools"
          curl -fsSL https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -o /tmp/cmdtools.zip
          unzip -q /tmp/cmdtools.zip -d "$ANDROID_HOME/cmdline-tools"
          mv "$ANDROID_HOME/cmdline-tools/cmdline-tools" "$ANDROID_HOME/cmdline-tools/latest"
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --sdk_root="$ANDROID_HOME" --licenses >/dev/null
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --sdk_root="$ANDROID_HOME" \
            "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Restore platform signing keys from Secrets
        run: |
          mkdir -p "${{ github.workspace }}/sign"
          echo "${{ secrets.PLATFORM_PK8_B64 }}" | base64 -d > "${{ github.workspace }}/sign/platform.pk8"
          echo "${{ secrets.PLATFORM_PEM_B64 }}" | base64 -d > "${{ github.workspace }}/sign/platform.x509.pem"
          chmod 600 "${{ github.workspace }}/sign/platform.pk8" "${{ github.workspace }}/sign/platform.x509.pem"

      - name: Build & sign APK
        run: bash ./build.sh

      - name: Upload signed APK (7 days)
        uses: actions/upload-artifact@v4
        with:
          name: ADBManager_signed
          path: bin/apk/ADBManager_signed.apk
          retention-days: 7
          if-no-files-found: error

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/') || github.event.inputs.release_tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag || github.ref_name }}
          name: ADBManager ${{ github.event.inputs.release_tag || github.ref_name }}
          files: bin/apk/ADBManager_signed.apk
          generate_release_notes: true
